<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Sản phẩm</title>

<style>

body{
font-family:Arial;
margin:20px;
}

img{
max-width:300px;
}

</style>

</head>

<body>

<h1 id="title"></h1>

<img id="image">

<p id="price"></p>

<p id="desc"></p>

<a id="buy" target="_blank">Mua ngay</a>

<script>

const slug = location.pathname.split("/")[1]

async function loadProduct(){

for(let i=1;i<=25;i++){

const res = await fetch("https://shop.tiemgiamgia.com/index/"+i+".json")

const data = await res.json()

const p = data.find(x=>x.slug===slug)

if(p){

document.title = p.title

document.getElementById("title").innerText = p.title

document.getElementById("image").src = p.image

document.getElementById("price").innerText = p.price.toLocaleString()+"đ"

document.getElementById("desc").innerText = p.desc

document.getElementById("buy").href = p.affiliate

break

}

}

}

loadProduct()

</script>

</body>
</html>
